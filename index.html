<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Escola de Dança</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>
  <div class="login-wrapper">
    <div class="card login-card p-4">
      <div class="text-center mb-3">
        <h3 class="mb-1">Escola de Dança</h3>
        <div class="small-muted">Backoffice / Portal</div>
      </div>

      

      <div id="loginMsg" class="alert d-none" role="alert"></div>

      <form id="loginForm">
        <div class="mb-3">
          <label class="form-label">Utilizador</label>
          <input id="username" type="text" class="form-control" placeholder="ex: admin / prof_joao / pai_carlos" required>
        </div>

        <div class="mb-3">
          <label class="form-label">Password</label>
          <input id="password" type="password" class="form-control" placeholder="••••••••" required>
        </div>

        <button class="btn btn-primary w-100" type="submit">
          <i class="fa-solid fa-right-to-bracket me-2"></i> Entrar
        </button>

        <div class="text-center mt-3 small-muted">
          Desenvolvido por: <b>The North Code</b>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
