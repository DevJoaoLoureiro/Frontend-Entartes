<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Criar Conta - Escola de Dança</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>
  <div class="login-wrapper">
    <div class="card login-card p-4">

      <div class="text-center mb-3">
        <h3 class="mb-1">Criar Conta</h3>
        <div class="small-muted">Escola de Dança</div>
      </div>

      <div id="msg" class="alert d-none"></div>

      <form id="formRegisto">

        <div class="mb-3">
          <label class="form-label">Email</label>
          <input id="email" class="form-control" readonly>
        </div>

        <div class="mb-3">
          <label class="form-label">Perfil</label>
          <input id="perfil" class="form-control" readonly>
        </div>

        <div class="mb-3">
          <label class="form-label">Nome</label>
          <input id="nome" type="text" class="form-control" required>
        </div>

        <div class="mb-3">
          <label class="form-label">Username</label>
          <input id="username" type="text" class="form-control" required>
        </div>

        <div class="mb-3">
          <label class="form-label">Password</label>
          <input id="password" type="password" class="form-control" required minlength="4">
        </div>

        <!-- ========================= -->
        <!-- EDUCADOS (ENCARREGADO) -->
        <!-- ========================= -->
        <div id="secEducandos" class="d-none">
          <hr>

          <div class="d-flex justify-content-between align-items-center mb-3">
            <h6 class="mb-0">Educandos</h6>

            <button type="button" id="btnAddEducando" class="btn btn-outline-primary btn-sm">
              <i class="fa-solid fa-plus me-2"></i>Adicionar educando
            </button>
          </div>

          <div id="listaEducandos"></div>
        </div>

        <button class="btn btn-primary w-100" type="submit">
          <i class="fa-solid fa-user-check me-2"></i> Criar conta
        </button>

        <div class="text-center mt-3 small-muted">
          Depois de criar a conta, será redirecionado para o login.
        </div>

      </form>

    </div>
  </div>

  <script src="js/registo.js"></script>
</body>
</html>
