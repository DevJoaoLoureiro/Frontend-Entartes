<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Criar Conta — Ent'Artes</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .reg-card {
      background: var(--white); border: 1px solid var(--border);
      border-radius: var(--radius); box-shadow: var(--shadow-md);
      padding: 40px 44px; width: 480px; max-width: 100%;
    }
    .reg-wrapper { min-height: 100vh; display: grid; place-items: center; padding: 32px 16px; background: var(--bg); }
  </style>
</head>
<body>

<div class="reg-wrapper">
  <div class="reg-card">

    <div class="form-eyebrow" style="margin-bottom:14px;"><div class="ey-line"></div><span class="ey-text">Nova conta</span></div>
    <h2 style="font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:600;color:var(--dark);margin-bottom:4px;">Criar <em style="font-style:italic;color:var(--teal);">conta</em></h2>
    <p style="font-size:0.85rem;color:var(--muted);font-weight:300;margin-bottom:28px;">Preenche os dados para activares o teu acesso à Ent'Artes.</p>

    <div id="msg" class="alert d-none"></div>

    <form id="formRegisto">

      <div class="login-field">
        <label for="email">Email</label>
        <input id="email" readonly style="background:var(--bg);opacity:0.7;">
      </div>

      <div class="login-field">
        <label for="perfil">Perfil</label>
        <input id="perfil" readonly style="background:var(--bg);opacity:0.7;">
      </div>

      <div class="login-field">
        <label for="nome">Nome completo</label>
        <input id="nome" type="text" required>
      </div>

      <div class="login-field">
        <label for="username">Nome de utilizador</label>
        <input id="username" type="text" required>
      </div>

      <div class="login-field">
        <label for="password">Palavra-passe</label>
        <input id="password" type="password" required minlength="4" placeholder="••••••••">
      </div>

      <!-- EDUCANDOS (ENCARREGADO) -->
      <div id="secEducandos" class="d-none">
        <div style="height:1px;background:var(--border);margin:20px 0;"></div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
          <span style="font-size:0.85rem;font-weight:500;color:var(--dark);">Educandos</span>
          <button type="button" id="btnAddEducando" class="btn btn-outline-secondary btn-sm">
            <i class="fa-solid fa-plus me-1"></i> Adicionar educando
          </button>
        </div>
        <div id="listaEducandos"></div>
      </div>

      <button class="btn-login" type="submit" style="margin-top:8px;">
        <i class="fa-solid fa-user-check me-2"></i> Criar conta
      </button>

      <div style="text-align:center;font-size:0.78rem;color:var(--muted);margin-top:12px;">
        Já tens conta? <a href="index.html" style="color:var(--teal);">Entrar</a>
      </div>

    </form>

  </div>
</div>

<script src="js/registo.js"></script>
</body>
</html>
