<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alunos — Ent'Artes</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
  <div id="layoutHost"></div>
  <template id="pageTemplate">

    <div class="page-hdr">
      <div class="page-hdr-row">
        <div>
          <div class="page-eyebrow">Gestão Escolar</div>
          <div class="page-title">Alunos</div>
          <div class="page-sub">Lista de alunos inscritos na escola</div>
        </div>
        <div class="btn-group-row">
          <input id="pesquisaAluno" class="form-control" style="width:220px;" placeholder="Pesquisar por nome...">
          <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalAluno" data-roles="ADMIN,SUPER_ADMIN">
            <i class="fa-solid fa-plus me-1"></i> Adicionar aluno
          </button>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="table-wrap">
        <table class="table align-middle mb-0">
          <thead>
            <tr>
              <th style="width:90px;">ID</th>
              <th>Nome</th>
              <th style="width:160px;">Nascimento</th>
              <th style="width:140px;">Maior?</th>
              <th style="width:220px;">Ações</th>
            </tr>
          </thead>
          <tbody id="tabelaAlunos"></tbody>
        </table>
      </div>
    </div>

    <div class="modal fade" id="modalAluno" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
          <form id="formAluno">
            <div class="modal-header">
              <h5 class="modal-title">Novo aluno</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
              <div class="row g-3">
                <div class="col-md-7">
                  <label class="form-label">Nome completo</label>
                  <input id="alunoNome" class="form-control" required>
                </div>
                <div class="col-md-5">
                  <label class="form-label">Data nascimento</label>
                  <input id="alunoNascimento" type="date" class="form-control" required>
                </div>
                <div class="col-md-6">
                  <label class="form-label">Telefone</label>
                  <input id="alunoTelefone" class="form-control">
                </div>
                <div class="col-md-6">
                  <label class="form-label">Email</label>
                  <input id="alunoEmail" type="email" class="form-control">
                </div>
              </div>
            </div>
            <div class="modal-footer">
              <button class="btn btn-secondary" type="button" data-bs-dismiss="modal">Cancelar</button>
              <button class="btn btn-primary" type="submit">Guardar</button>
            </div>
          </form>
        </div>
      </div>
    </div>

  </template>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/layout.js"></script>
  <script src="../js/alunos.js"></script>
  <script>
    requireAuth();
    (async () => {
      await loadLayout({ pageTitle: "Alunos", activePage: "alunos" });
      document.getElementById("pageContent").appendChild(
        document.getElementById("pageTemplate").content.cloneNode(true)
      );
      if (typeof initAlunos === "function") initAlunos();
    })();
  </script>
</body>
</html>
