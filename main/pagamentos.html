<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pagamentos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
</head>

<body>
  <div id="layoutHost"></div>

  <template id="pageTemplate">

    <div class="d-flex gap-2 mb-3">
      <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalPagamento" data-roles="ADMIN,SUPER_ADMIN">
        <i class="fa-solid fa-plus me-2"></i> Novo pagamento
      </button>

      <select id="filtroEstado" class="form-select" style="max-width: 220px;">
        <option value="">Todos</option>
        <option value="PENDENTE">Pendentes</option>
        <option value="PAGO">Pagos</option>
      </select>

      <input id="pesquisaPagamento" class="form-control" placeholder="Pesquisar por aluno/descrição...">
    </div>

    <div id="msgPag" class="alert d-none"></div>

    <div class="table-responsive">
      <table class="table table-bordered table-striped align-middle">
        <thead>
          <tr>
            <th style="width:90px;">ID</th>
            <th>Aluno</th>
            <th>Descrição</th>
            <th style="width:140px;">Valor</th>
            <th style="width:160px;">Vencimento</th>
            <th style="width:140px;">Estado</th>
            <th style="width:220px;">Ações</th>
          </tr>
        </thead>
        <tbody id="tblPagamentos"></tbody>
      </table>
    </div>

    <!-- MODAL: CRIAR PAGAMENTO (ADMIN) -->
    <div class="modal fade" id="modalPagamento" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
          <form id="formPagamento">
            <div class="modal-header">
              <h5 class="modal-title">Novo pagamento</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
              <div class="row g-3">
                <div class="col-md-6">
                  <label class="form-label">Aluno</label>
                  <input id="pagAluno" class="form-control" placeholder="Nome do aluno" required>
                </div>
                <div class="col-md-6">
                  <label class="form-label">Descrição</label>
                  <input id="pagDesc" class="form-control" placeholder="Mensalidade, traje, etc." required>
                </div>

                <div class="col-md-4">
                  <label class="form-label">Valor (€)</label>
                  <input id="pagValor" type="number" step="0.01" min="0" class="form-control" required>
                </div>

                <div class="col-md-4">
                  <label class="form-label">Vencimento</label>
                  <input id="pagVenc" type="date" class="form-control" required>
                </div>

                <div class="col-md-4">
                  <label class="form-label">Estado</label>
                  <select id="pagEstado" class="form-select">
                    <option value="PENDENTE">Pendente</option>
                    <option value="PAGO">Pago</option>
                  </select>
                </div>
              </div>

              <div class="small-muted mt-3">
                * Mock por agora (localStorage). Depois ligamos ao backend com tabela pagamentos.
              </div>
            </div>

            <div class="modal-footer">
              <button class="btn btn-secondary" type="button" data-bs-dismiss="modal">Cancelar</button>
              <button class="btn btn-primary" type="submit">Guardar</button>
            </div>
          </form>
        </div>
      </div>
    </div>

  </template>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/layout.js"></script>
  <script src="../js/pagamentos.js"></script>

  <script>
       requireAuth();
      setUserInfo();
      applyRoleUI();
    (async () => {
      await loadLayout({ pageTitle: "Pagamentos", activePage: "pagamentos" });

      const pageContent = document.getElementById("pageContent");
      const tpl = document.getElementById("pageTemplate");
      pageContent.appendChild(tpl.content.cloneNode(true));

      if (typeof initPagamentos === "function") initPagamentos();
    })().catch(console.error);
  </script>
</body>
</html>
