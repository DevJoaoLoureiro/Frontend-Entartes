<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Presenças</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
</head>

<body>

  <!-- Layout vai ser injetado aqui -->
  <div id="layoutHost"></div>

  <!-- Template da página -->
  <template id="pageTemplate">
    <div class="p-4">

      <div class="mb-3">
        <label class="form-label">Selecionar Sessão</label>
        <select id="selectSessao" class="form-select"></select>
      </div>

      <div class="table-responsive">
        <table class="table table-bordered align-middle">
          <thead>
            <tr>
              <th>Aluno</th>
              <th style="width:120px;">Presente</th>
            </tr>
          </thead>
          <tbody id="tblPresencas"></tbody>
        </table>
      </div>

    </div>
  </template>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/layout.js"></script>
  <script src="../js/presencas.js"></script>

  <script>
    (async () => {
      await loadLayout({ pageTitle: "Presenças", activePage: "presencas" });

      const pageContent = document.getElementById("pageContent");
      const tpl = document.getElementById("pageTemplate");

      if (!pageContent || !tpl) {
        console.error("Layout ou template não encontrados");
        return;
      }

      pageContent.appendChild(tpl.content.cloneNode(true));

      if (typeof initPresencas === "function") initPresencas();
    })();
  </script>

</body>
</html>
