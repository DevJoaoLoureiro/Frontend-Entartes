<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eventos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
</head>

<body>
  <div id="layoutHost"></div>

  <template id="pageTemplate">
    <div class="d-flex gap-2 mb-3">
      <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalEvento" data-roles="ADMIN,SUPER_ADMIN">
        <i class="fa-solid fa-plus me-2"></i> Novo evento
      </button>
      <input id="pesquisaEvento" class="form-control" placeholder="Pesquisar por título...">
    </div>

    <div class="row g-3" id="listaEventos"></div>

    <div class="modal fade" id="modalEvento" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
          <form id="formEvento">
            <div class="modal-header">
              <h5 class="modal-title">Novo evento</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
              <div class="row g-3">
                <div class="col-md-8">
                  <label class="form-label">Título</label>
                  <input id="evtTitulo" class="form-control" required>
                </div>
                <div class="col-md-4">
                  <label class="form-label">Local</label>
                  <input id="evtLocal" class="form-control" placeholder="ex: Pavilhão">
                </div>
                <div class="col-md-6">
                  <label class="form-label">Início</label>
                  <input id="evtInicio" type="datetime-local" class="form-control" required>
                </div>
                <div class="col-md-6">
                  <label class="form-label">Fim</label>
                  <input id="evtFim" type="datetime-local" class="form-control">
                </div>
                <div class="col-12">
                  <label class="form-label">Descrição</label>
                  <textarea id="evtDesc" class="form-control" rows="3"></textarea>
                </div>
                <div class="col-12">
                  <div class="form-check">
                    <input id="evtPublico" class="form-check-input" type="checkbox" checked>
                    <label class="form-check-label" for="evtPublico">Visível para encarregados</label>
                  </div>
                </div>
              </div>
            </div>

            <div class="modal-footer">
              <button class="btn btn-secondary" type="button" data-bs-dismiss="modal">Cancelar</button>
              <button class="btn btn-primary" type="submit">Publicar</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </template>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/layout.js"></script>
  <script src="../js/eventos.js"></script>

  <script>

      requireAuth();
      setUserInfo();
      applyRoleUI();
    (async () => {
      await loadLayout({ pageTitle: "Eventos", activePage: "eventos" });

      const pageContent = document.getElementById("pageContent");
      const tpl = document.getElementById("pageTemplate");
      pageContent.appendChild(tpl.content.cloneNode(true));

      // ✅ chama a função certa
      if (typeof initEventos === "function") initEventos();
    })().catch(console.error);
  </script>
</body>
</html>
