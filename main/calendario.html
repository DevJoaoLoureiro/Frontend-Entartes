<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calendário</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
  <div id="layoutHost"></div>
          

  <template id="pageTemplate">
        <div class="row g-3">
          <div class="col-lg-4">
            <div class="card card-soft p-3">
              <h6 class="mb-3">Filtrar</h6>

              <label class="form-label">Aluno (demo)</label>
              <select id="selAluno" class="form-select mb-3">
                <option value="todos">Todos</option>
                <option value="Ana Silva">Ana Silva</option>
                <option value="Carla Rocha">Carla Rocha</option>
              </select>

              <label class="form-label">Texto</label>
              <input id="txtFiltro" class="form-control" placeholder="turma, tipo...">
            </div>

            <div class="card card-soft p-3 mt-3">
              <h6 class="mb-2">Desmarcar aula</h6>
              <div class="small-muted mb-2">Seleciona uma sessão na lista para desmarcar.</div>
              <div id="boxSelected" class="small-muted mb-2">Nenhuma sessão selecionada.</div>

              <div class="mb-2">
                <label class="form-label">Motivo</label>
                <textarea id="txtMotivo" class="form-control" rows="3" placeholder="ex: doente / consulta / viagem"></textarea>
              </div>

              <button id="btnDesmarcar" class="btn btn-danger w-100" disabled>
                <i class="fa-solid fa-ban me-2"></i> Desmarcar
              </button>
            </div>
          </div>

          <div class="col-lg-8">
            <div class="card card-soft p-3">
              <div class="d-flex justify-content-between align-items-center mb-2">
                <h6 class="m-0">Próximas aulas</h6>
                <span class="small-muted">Clique numa linha para selecionar</span>
              </div>
              <div class="table-responsive">
                <table class="table table-bordered table-striped align-middle mb-0">
                  <thead>
                    <tr>
                      <th style="width:80px;">ID</th>
                      <th>Aluno</th>
                      <th>Turma</th>
                      <th>Tipo</th>
                      <th style="width:170px;">Data</th>
                      <th style="width:120px;">Estado</th>
                    </tr>
                  </thead>
                  <tbody id="tblCalendario"></tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
    </template>
        </div>
      </main>
    </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/auth.js"></script>
    <script src="../js/layout.js"></script>
  <script src="../js/calendario.js"></script>
  <script>
    requireAuth();
    setUserInfo();
    applyRoleUI();
    setActiveMenu("calendario");

  
    (async () => {
      await loadLayout({ pageTitle: "Calendario", activePage: "calendario" });

      // injeta o conteúdo da página dentro do layout
      const tpl = document.getElementById("pageTemplate");
      document.getElementById("pageContent").appendChild(tpl.content.cloneNode(true));

      // agora sim, iniciar a lógica (os elementos já existem)
      if (typeof initAlunos === "function") initCalendario();
    })();

  </script>
</body>
</html>
