<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Calendário — Ent'Artes</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

  <link rel="stylesheet" href="../css/styles.css">
</head>

<body>

  <div id="layoutHost"></div>

  <template id="pageTemplate">

    <!-- HEADER -->
    <div class="page-hdr">
      <div class="page-hdr-row">

        <div>
          <div class="page-eyebrow">Agenda</div>
          <div class="page-title">Calendário</div>
          <div class="page-sub">
            Consulta de aulas, confirmações e desistências
          </div>
        </div>

        <div class="btn-group-row">
          <a href="coachings.html" class="btn btn-outline-secondary">
            <i class="fa-solid fa-person-chalkboard me-1"></i>
            Coachings
          </a>

          <a href="eventos.html" class="btn btn-primary">
            <i class="fa-solid fa-calendar-days me-1"></i>
            Eventos
          </a>
        </div>

      </div>
    </div>

    <!-- KPIS -->
    <div class="row g-3 mb-4">

      <div class="col-md-4">
        <div class="stat-card">
          <div class="stat-icon-wrap teal">
            <i class="fa-solid fa-calendar-check"></i>
          </div>

          <div class="stat-val" id="kpiPendentes">—</div>

          <div class="stat-lbl">
            Aulas pendentes confirmação
          </div>
        </div>
      </div>

      <div class="col-md-4">
        <div class="stat-card gold">
          <div class="stat-icon-wrap gold">
            <i class="fa-solid fa-circle-check"></i>
          </div>

          <div class="stat-val" id="kpiConfirmadas">—</div>

          <div class="stat-lbl">
            Aulas confirmadas
          </div>
        </div>
      </div>

      <div class="col-md-4">
        <div class="stat-card neutral">
          <div class="stat-icon-wrap grey">
            <i class="fa-solid fa-ban"></i>
          </div>

          <div class="stat-val" id="kpiDesmarcadas">—</div>

          <div class="stat-lbl">
            Aulas desmarcadas
          </div>
        </div>
      </div>

    </div>

    <!-- CONTEÚDO -->
    <div class="row g-3">

      <!-- FILTROS -->
      <div class="col-lg-4">

        <div class="card">
          <div class="card-hdr">
            <div>
              <div class="card-title">Filtros</div>
              <div class="card-sub">
                Procurar aulas rapidamente
              </div>
            </div>
          </div>

          <div style="padding:20px;">

            <div class="mb-3">
              <label class="form-label">Aluno</label>

              <select id="selAluno" class="form-select">
                <option value="todos">Todos</option>
              </select>
            </div>

            <div class="mb-3">
              <label class="form-label">Pesquisar</label>

              <input
                id="txtFiltro"
                class="form-control"
                placeholder="turma, professor, tipo..."
              >
            </div>

          </div>
        </div>

        <!-- DESMARCAR -->
        <div class="card mt-3">

          <div class="card-hdr">
            <div>
              <div class="card-title">Desmarcar aula</div>

              <div class="card-sub">
                Seleciona uma sessão da lista
              </div>
            </div>
          </div>

          <div style="padding:20px;">

            <div
              id="boxSelected"
              class="alert alert-light border"
            >
              Nenhuma sessão selecionada.
            </div>

            <div class="mb-3">
              <label class="form-label">
                Motivo da desistência
              </label>

              <textarea
                id="txtMotivo"
                class="form-control"
                rows="4"
                placeholder="Ex: doença, consulta, viagem..."
              ></textarea>
            </div>

            <button
              id="btnDesmarcar"
              class="btn btn-outline-danger w-100"
              disabled
            >
              <i class="fa-solid fa-ban me-2"></i>
              Desmarcar aula
            </button>

          </div>
        </div>

      </div>

      <!-- TABELA -->
      <div class="col-lg-8">

        <div class="card">

          <div class="card-hdr">
            <div>
              <div class="card-title">Próximas aulas</div>

              <div class="card-sub">
                Clique numa linha para selecionar
              </div>
            </div>
          </div>

          <div class="table-wrap">

            <table class="table align-middle mb-0">

              <thead>
                <tr>
                  <th style="width:80px;">ID</th>
                  <th>Aluno</th>
                  <th>Turma</th>
                  <th>Tipo</th>
                  <th style="width:180px;">Data</th>
                  <th style="width:140px;">Estado</th>
                </tr>
              </thead>

              <tbody id="tblCalendario">

                <tr>
                  <td colspan="6" class="text-center small-muted">
                    A carregar...
                  </td>
                </tr>

              </tbody>

            </table>

          </div>
        </div>

      </div>

    </div>

  </template>

  <!-- SCRIPTS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <script src="../js/auth.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/layout.js"></script>
  <script src="../js/calendario.js"></script>

  <script>
    requireAuth();

    (async () => {

      await loadLayout({
        pageTitle: "Calendário",
        activePage: "calendario"
      });

      const pageContent = document.getElementById("pageContent");
      const tpl = document.getElementById("pageTemplate");

      pageContent.appendChild(
        tpl.content.cloneNode(true)
      );

      setUserInfo();
      applyRoleUI();

      if (typeof initCalendario === "function") {
        initCalendario();
      }

    })().catch(console.error);
  </script>

</body>
</html>
