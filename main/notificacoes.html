<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notificações</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
</head>

<body>
  <div id="layoutHost"></div>

  <template id="pageTemplate">

    <div class="d-flex gap-2 mb-3">
      <button class="btn btn-outline-secondary" id="btnMarcarTodas">
        <i class="fa-solid fa-check-double me-2"></i> Marcar todas como lidas
      </button>

      <select id="filtroLidas" class="form-select" style="max-width: 220px;">
        <option value="todas">Todas</option>
        <option value="nao_lidas">Não lidas</option>
        <option value="lidas">Lidas</option>
      </select>

      <input id="pesquisaNotif" class="form-control" placeholder="Pesquisar...">
    </div>

    <div id="msgNotif" class="alert d-none"></div>

    <div class="list-group" id="listaNotif"></div>

  </template>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/layout.js"></script>
  <script src="../js/notificacoes.js"></script>

  <script>
       requireAuth();
      setUserInfo();
      applyRoleUI();
    (async () => {
      await loadLayout({ pageTitle: "Notificações", activePage: "notificacoes" });

      const pageContent = document.getElementById("pageContent");
      const tpl = document.getElementById("pageTemplate");
      pageContent.appendChild(tpl.content.cloneNode(true));

      if (typeof initNotificacoes === "function") initNotificacoes();
    })().catch(console.error);
  </script>
</body>
</html>
