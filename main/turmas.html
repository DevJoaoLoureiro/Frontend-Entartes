<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Turmas</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
</head>

<body>
  <div id="layoutHost"></div>

  <template id="pageTemplate">
    <div class="d-flex gap-2 mb-3 align-items-center">
      <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalTurma" data-roles="ADMIN,SUPER_ADMIN">
        <i class="fa-solid fa-plus me-2"></i> Nova turma
      </button>

      <input id="pesquisaTurma" class="form-control" placeholder="Pesquisar por nome/professor...">

      <select id="filtroAtiva" class="form-select" style="max-width: 190px;">
        <option value="">Ativas + Inativas</option>
        <option value="true">Só ativas</option>
        <option value="false">Só inativas</option>
      </select>
    </div>

    <div id="msgTurmas" class="alert d-none"></div>

    <div class="table-responsive">
      <table class="table table-bordered table-striped align-middle">
        <thead>
          <tr>
            <th style="width: 90px;">ID</th>
            <th>Nome</th>
            <th style="width: 120px;">Capacidade</th>
            <th>Professor</th>
            <th style="width: 120px;">Ativa</th>
          </tr>
        </thead>
        <tbody id="tblTurmas"></tbody>
      </table>
    </div>

    <!-- MODAL CRIAR TURMA -->
    <div class="modal fade" id="modalTurma" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
          <form id="formTurma">
            <div class="modal-header">
              <h5 class="modal-title">Criar turma</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
              <div class="row g-3">
                <div class="col-md-6">
                  <label class="form-label">Nome</label>
                  <input id="turmaNome" class="form-control" required>
                </div>

                <div class="col-md-3">
                  <label class="form-label">Capacidade</label>
                  <input id="turmaCapacidade" type="number" min="0" class="form-control" value="0">
                </div>

                <div class="col-md-3">
                  <label class="form-label">Nível (opcional)</label>
                  <input id="turmaNivel" class="form-control" placeholder="ex: Iniciados">
                </div>

                <div class="col-md-12">
                  <label class="form-label">Professor</label>
                  <select id="turmaProfessor" class="form-select">
                    <option value="">— Sem professor —</option>
                  </select>
                  <div class="small-muted mt-1">Vem de /api/utilizadores/professores</div>
                </div>
              </div>

              <div id="msgCriarTurma" class="alert d-none mt-3"></div>
            </div>

            <div class="modal-footer">
              <button class="btn btn-secondary" type="button" data-bs-dismiss="modal">Cancelar</button>
              <button class="btn btn-primary" type="submit">
                <i class="fa-solid fa-floppy-disk me-2"></i> Guardar
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </template>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/layout.js"></script>
  <script src="../js/turmas.js"></script>

  <script>
    (async () => {
      await loadLayout({ pageTitle: "Turmas", activePage: "turmas" });

      const pageContent = document.getElementById("pageContent");
      const tpl = document.getElementById("pageTemplate");
      pageContent.appendChild(tpl.content.cloneNode(true));

      if (typeof initTurmas === "function") initTurmas();
    })().catch(console.error);
  </script>
</body>
</html>
