<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inventário</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
</head>

<body>
  <div id="layoutHost"></div>

  <template id="pageTemplate">

    <div class="page-hdr">
      <div class="page-hdr-row">
        <div>
          <div class="page-eyebrow">Gestão</div>
          <div class="page-title">Inventário</div>
          <div class="page-sub">Material da escola disponível para aluguer</div>
        </div>

        <div class="btn-group-row">
          <input id="pesquisaItem" class="form-control" style="width:200px;" placeholder="Pesquisar...">

          <select id="filtroCategoria" class="form-select" style="width:180px;">
            <option value="">Todas</option>
            <option value="Trajes">Trajes</option>
            <option value="Sapatos">Sapatos</option>
            <option value="Acessórios">Acessórios</option>
          </select>

          <button class="btn btn-primary"
                  data-bs-toggle="modal"
                  data-bs-target="#modalItem"
                  data-roles="ADMIN,SUPER_ADMIN">
            <i class="fa-solid fa-plus me-1"></i> Novo item
          </button>
        </div>
      </div>
    </div>

    <div id="msgInventario" class="alert d-none"></div>

    <div class="row g-3" id="listaInventario"></div>

    <!-- MODAL: CRIAR ITEM -->
    <div class="modal fade" id="modalItem" tabindex="-1">
      <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">

          <form id="formItem">
            <div class="modal-header">
              <h5 class="modal-title">Novo item</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
              <div class="row g-3">

                <div class="col-md-6">
                  <label class="form-label">Nome</label>
                  <input id="invNome" class="form-control" required>
                </div>

                <div class="col-md-3">
                  <label class="form-label">Categoria</label>
                  <select id="invCategoria" class="form-select">
                    <option value="Trajes">Trajes</option>
                    <option value="Sapatos">Sapatos</option>
                    <option value="Acessórios">Acessórios</option>
                  </select>
                </div>

                <div class="col-md-3">
                  <label class="form-label">Tamanho</label>
                  <input id="invTamanho" class="form-control" placeholder="ex: S / M / 36">
                </div>

                <div class="col-md-4">
                  <label class="form-label">Quantidade total</label>
                  <input id="invQtdTotal" type="number" min="0" class="form-control" value="1" required>
                </div>

                <div class="col-md-4">
                  <label class="form-label">Disponível</label>
                  <input id="invQtdDisp" type="number" min="0" class="form-control" value="1" required>
                </div>

                <div class="col-md-4">
                  <label class="form-label">Preço aluguer (€)</label>
                  <input id="invPreco" type="number" step="0.01" min="0" class="form-control" value="0">
                </div>

                <div class="col-md-12">
                  <label class="form-label">Localização</label>
                  <input id="invLocalizacao" class="form-control" placeholder="Ex: Armário A / Sala 2">
                </div>

                <div class="col-md-12">
                  <label class="form-label">Imagem</label>
                  <input id="invImagem" type="file" accept="image/*" class="form-control">
                  <div class="form-text">Seleciona uma imagem do computador ou telemóvel.</div>
                </div>

              </div>
            </div>

            <div class="modal-footer">
              <button class="btn btn-secondary" type="button" data-bs-dismiss="modal">Cancelar</button>
              <button class="btn btn-primary" type="submit">Guardar</button>
            </div>
          </form>

        </div>
      </div>
    </div>

    <!-- MODAL: ALUGAR ITEM -->
    <div class="modal fade" id="modalAluguer" tabindex="-1">
      <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">

          <form id="formAluguer">

            <div class="modal-header">
              <h5 class="modal-title">Alugar item</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">

              <input type="hidden" id="aluguerItemId">

              <div class="row g-3">

                <div class="col-md-8">
                  <label class="form-label">Item</label>
                  <input id="aluguerItemNome" class="form-control" disabled>
                </div>

                <div class="col-md-4">
                  <label class="form-label">Tamanho</label>
                  <input id="aluguerTamanho" class="form-control" disabled>
                </div>

                <div class="col-md-12">
                  <label class="form-label">Educando</label>
                  <select id="aluguerAlunoId" class="form-select" required>
                    <option value="">Selecionar educando</option>
                  </select>
                </div>

                <div class="col-md-6">
                  <label class="form-label">Data início</label>
                  <input id="aluguerInicio" type="date" class="form-control" required>
                </div>

                <div class="col-md-6">
                  <label class="form-label">Data fim prevista</label>
                  <input id="aluguerFim" type="date" class="form-control" required>
                </div>

                <div class="col-md-12">
                  <label class="form-label">Observações</label>
                  <textarea id="aluguerObs" class="form-control" rows="2"></textarea>
                </div>

              </div>
            </div>

            <div class="modal-footer">
              <button class="btn btn-secondary" type="button" data-bs-dismiss="modal">Cancelar</button>
              <button class="btn btn-primary" type="submit">Confirmar aluguer</button>
            </div>

          </form>

        </div>
      </div>
    </div>

  </template>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <script src="../js/auth.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/layout.js"></script>
  <script src="../js/inventario.js"></script>

  <script>
    requireAuth();
    setUserInfo();
    applyRoleUI();

    (async () => {
      await loadLayout({ pageTitle: "Inventário", activePage: "inventario" });

      const pageContent = document.getElementById("pageContent");
      const tpl = document.getElementById("pageTemplate");

      pageContent.appendChild(tpl.content.cloneNode(true));

      if (typeof initInventario === "function") initInventario();
    })().catch(console.error);
  </script>

</body>
</html>
