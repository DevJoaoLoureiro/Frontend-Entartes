<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inventário</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
</head>

<body>
  <div id="layoutHost"></div>

  <template id="pageTemplate">

    <div class="d-flex gap-2 mb-3">
      <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalItem" data-roles="ADMIN,SUPER_ADMIN">
        <i class="fa-solid fa-plus me-2"></i> Novo item
      </button>

      <input id="pesquisaItem" class="form-control" placeholder="Pesquisar por nome/categoria...">

      <select id="filtroCategoria" class="form-select" style="max-width: 220px;">
        <option value="">Todas as categorias</option>
        <option value="Trajes">Trajes</option>
        <option value="Sapatos">Sapatos</option>
        <option value="Acessórios">Acessórios</option>
      </select>
    </div>

    <div id="msgInventario" class="alert d-none"></div>

    <div class="row g-3" id="listaInventario"></div>

    <!-- MODAL: NOVO ITEM (ADMIN) -->
    <div class="modal fade" id="modalItem" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
          <form id="formItem">
            <div class="modal-header">
              <h5 class="modal-title">Novo item de inventário</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
              <div class="row g-3">
                <div class="col-md-6">
                  <label class="form-label">Nome</label>
                  <input id="invNome" class="form-control" required>
                </div>

                <div class="col-md-3">
                  <label class="form-label">Categoria</label>
                  <select id="invCategoria" class="form-select" required>
                    <option value="Trajes">Trajes</option>
                    <option value="Sapatos">Sapatos</option>
                    <option value="Acessórios">Acessórios</option>
                  </select>
                </div>

                <div class="col-md-3">
                  <label class="form-label">Tamanho</label>
                  <input id="invTamanho" class="form-control" placeholder="ex: S / M / 34">
                </div>

                <div class="col-md-4">
                  <label class="form-label">Quantidade total</label>
                  <input id="invQtdTotal" type="number" min="0" class="form-control" value="1" required>
                </div>

                <div class="col-md-4">
                  <label class="form-label">Quantidade disponível</label>
                  <input id="invQtdDisp" type="number" min="0" class="form-control" value="1" required>
                </div>

                <div class="col-md-4">
                  <label class="form-label">Preço aluguer (€)</label>
                  <input id="invPreco" type="number" step="0.01" min="0" class="form-control" value="0" required>
                </div>
              </div>

              <div class="small-muted mt-3">
                * Para já fica em mock. Depois ligamos ao backend (tabela inventario_itens + alugueres).
              </div>
            </div>

            <div class="modal-footer">
              <button class="btn btn-secondary" type="button" data-bs-dismiss="modal">Cancelar</button>
              <button class="btn btn-primary" type="submit">Guardar</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- MODAL: PEDIR ALUGUER (ENCARREGADO) -->
    <div class="modal fade" id="modalAluguer" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
          <form id="formAluguer">
            <div class="modal-header">
              <h5 class="modal-title">Pedir aluguer</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
              <input type="hidden" id="aluguerItemId">

              <div class="row g-3">
                <div class="col-md-8">
                  <label class="form-label">Item</label>
                  <input id="aluguerItemNome" class="form-control" disabled>
                </div>

                <div class="col-md-4">
                  <label class="form-label">Tamanho</label>
                  <input id="aluguerTamanho" class="form-control" disabled>
                </div>

                <div class="col-md-6">
                  <label class="form-label">Data início</label>
                  <input id="aluguerInicio" type="date" class="form-control" required>
                </div>

                <div class="col-md-6">
                  <label class="form-label">Data fim</label>
                  <input id="aluguerFim" type="date" class="form-control" required>
                </div>

                <div class="col-12">
                  <label class="form-label">Observações (opcional)</label>
                  <textarea id="aluguerObs" class="form-control" rows="2"></textarea>
                </div>
              </div>

              <div class="small-muted mt-3">
                * O pedido vai ficar como “PEDIDO” (mock). Depois ligamos ao backend.
              </div>
            </div>

            <div class="modal-footer">
              <button class="btn btn-secondary" type="button" data-bs-dismiss="modal">Cancelar</button>
              <button class="btn btn-primary" type="submit">Enviar pedido</button>
            </div>
          </form>
        </div>
      </div>
    </div>

  </template>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/layout.js"></script>
  <script src="../js/inventario.js"></script>

  <script>
        requireAuth();
      setUserInfo();
      applyRoleUI();
    (async () => {
      await loadLayout({ pageTitle: "Inventário", activePage: "inventario" });

      const pageContent = document.getElementById("pageContent");
      const tpl = document.getElementById("pageTemplate");
      pageContent.appendChild(tpl.content.cloneNode(true));

      if (typeof initInventario === "function") initInventario();
    })().catch(console.error);
  </script>
</body>
</html>
