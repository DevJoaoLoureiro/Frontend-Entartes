<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Ent'Artes</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
</head>

<body>
  <div id="layoutHost"></div>

  <template id="pageTemplate">

    <div class="page-hdr">
      <div class="page-hdr-row">
        <div>
          <div class="page-eyebrow">Visão Geral</div>
          <div class="page-title">Dashboard</div>
          <div class="page-sub">Resumo real do sistema Ent'Artes</div>
        </div>

        <div class="btn-group-row">
          <a class="btn btn-outline-secondary" href="sessoes_aula.html" data-prof-admin>
            <i class="fa-solid fa-plus me-1"></i> Criar sessão
          </a>

          <a class="btn btn-primary" href="eventos.html" data-prof-admin>
            <i class="fa-solid fa-bullhorn me-1"></i> Publicar evento
          </a>
        </div>
      </div>
    </div>

    <!-- KPIS -->
    <div class="row g-3 mb-4">

      <div class="col-md-3">
        <div class="stat-card">
          <div class="stat-icon-wrap teal"><i class="fa-solid fa-user-graduate"></i></div>
          <div class="stat-val" id="kpiAlunos">—</div>
          <div class="stat-lbl">Total de alunos</div>
        </div>
      </div>

      <div class="col-md-3">
        <div class="stat-card gold">
          <div class="stat-icon-wrap gold"><i class="fa-solid fa-users"></i></div>
          <div class="stat-val" id="kpiTurmas">—</div>
          <div class="stat-lbl">Turmas ativas</div>
        </div>
      </div>

      <div class="col-md-3">
        <div class="stat-card neutral">
          <div class="stat-icon-wrap grey"><i class="fa-solid fa-clock"></i></div>
          <div class="stat-val" id="kpiSessoes">—</div>
          <div class="stat-lbl">Sessões por dar</div>
        </div>
      </div>

      <div class="col-md-3">
        <div class="stat-card">
          <div class="stat-icon-wrap teal"><i class="fa-solid fa-person-chalkboard"></i></div>
          <div class="stat-val" id="kpiCoachings">—</div>
          <div class="stat-lbl">Coachings abertos</div>
        </div>
      </div>

      <div class="col-md-3" data-admin-only>
        <div class="stat-card gold">
          <div class="stat-icon-wrap gold"><i class="fa-solid fa-euro-sign"></i></div>
          <div class="stat-val" id="kpiPagPendentes">—</div>
          <div class="stat-lbl">Pagamentos pendentes</div>
        </div>
      </div>

      <div class="col-md-3" data-admin-only>
        <div class="stat-card">
          <div class="stat-icon-wrap teal"><i class="fa-solid fa-coins"></i></div>
          <div class="stat-val" id="kpiValorPendente">—</div>
          <div class="stat-lbl">Valor pendente</div>
        </div>
      </div>

      <div class="col-md-3" data-admin-only>
        <div class="stat-card neutral">
          <div class="stat-icon-wrap grey"><i class="fa-solid fa-box"></i></div>
          <div class="stat-val" id="kpiStockBaixo">—</div>
          <div class="stat-lbl">Stock baixo</div>
        </div>
      </div>

      <div class="col-md-3">
        <div class="stat-card neutral">
          <div class="stat-icon-wrap grey"><i class="fa-solid fa-bell"></i></div>
          <div class="stat-val" id="kpiNotif">—</div>
          <div class="stat-lbl">Notificações por ler</div>
        </div>
      </div>

    </div>

    <!-- TABELAS -->
    <div class="row g-3">

      <div class="col-lg-7">
        <div class="card">
          <div class="card-hdr">
            <div>
              <div class="card-title">Próximas sessões</div>
              <div class="card-sub">Aulas normais e sessões agendadas</div>
            </div>
            <a href="sessoes_aula.html" class="btn btn-sm btn-outline-secondary">Ver tudo</a>
          </div>

          <div class="table-wrap">
            <table class="table table-sm align-middle mb-0">
              <thead>
                <tr>
                  <th>Turma</th>
                  <th>Data</th>
                  <th>Professor</th>
                  <th>Estado</th>
                </tr>
              </thead>
              <tbody id="tblProximas"></tbody>
            </table>
          </div>
        </div>
      </div>

      <div class="col-lg-5">
        <div class="card">
          <div class="card-hdr">
            <div>
              <div class="card-title">Coachings abertos</div>
              <div class="card-sub">Sessões abertas para inscrição</div>
            </div>
            <a href="coachings.html" class="btn btn-sm btn-outline-secondary">Ver</a>
          </div>

          <div class="table-wrap">
            <table class="table table-sm align-middle mb-0">
              <thead>
                <tr>
                  <th>Data</th>
                  <th>Sumário</th>
                  <th>Preço</th>
                  <th>Estado</th>
                </tr>
              </thead>
              <tbody id="tblCoachingsDash"></tbody>
            </table>
          </div>
        </div>
      </div>

      <div class="col-lg-7">
        <div class="card">
          <div class="card-hdr">
            <div>
              <div class="card-title">Pagamentos pendentes</div>
              <div class="card-sub">Mensalidades e coachings ainda por liquidar</div>
            </div>
            <a href="pagamentos.html" class="btn btn-sm btn-outline-secondary">Ver pagamentos</a>
          </div>

          <div class="table-wrap">
            <table class="table table-sm align-middle mb-0">
              <thead>
                <tr>
                  <th>Aluno</th>
                  <th>Tipo</th>
                  <th>Descrição</th>
                  <th>Valor</th>
                </tr>
              </thead>
              <tbody id="tblPagamentosDash"></tbody>
            </table>
          </div>
        </div>
      </div>

      <div class="col-lg-5">
        <div class="card">
          <div class="card-hdr">
            <div>
              <div class="card-title">Próximos eventos</div>
              <div class="card-sub">Eventos públicos/agendados</div>
            </div>
            <a href="eventos.html" class="btn btn-sm btn-outline-secondary">Ver</a>
          </div>

          <div class="table-wrap">
            <table class="table table-sm align-middle mb-0">
              <thead>
                <tr>
                  <th>Evento</th>
                  <th>Data</th>
                  <th>Local</th>
                </tr>
              </thead>
              <tbody id="tblEventosDash"></tbody>
            </table>
          </div>
        </div>
      </div>

      <div class="col-lg-12">
        <div class="card">
          <div class="card-hdr">
            <div class="card-title">Ações rápidas</div>
          </div>

          <div style="padding:20px 24px;display:flex;gap:10px;flex-wrap:wrap;">
            <a class="btn btn-outline-secondary" href="sessoes_aula.html" data-prof-admin>
              <i class="fa-solid fa-plus me-2"></i>Criar sessão
            </a>

            <a class="btn btn-outline-secondary" href="coachings.html">
              <i class="fa-solid fa-person-chalkboard me-2"></i>Ver coachings
            </a>

            <a class="btn btn-outline-secondary" href="pagamentos.html">
              <i class="fa-solid fa-euro-sign me-2"></i>Pagamentos
            </a>

            <a class="btn btn-outline-secondary" href="inventario.html">
              <i class="fa-solid fa-boxes-stacked me-2"></i>Inventário
            </a>

            <a class="btn btn-outline-secondary" href="notificacoes.html">
              <i class="fa-solid fa-bell me-2"></i>Notificações
            </a>
          </div>
        </div>
      </div>

    </div>

  </template>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <script src="../js/auth.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/layout.js"></script>
  <script src="../js/dashboard.js"></script>

  <script>
    requireAuth();

    (async () => {
      await loadLayout({ pageTitle: "Dashboard", activePage: "dashboard" });

      const pageContent = document.getElementById("pageContent");
      const tpl = document.getElementById("pageTemplate");

      pageContent.appendChild(tpl.content.cloneNode(true));

      setUserInfo();
      applyRoleUI();

      if (typeof initDashboard === "function") initDashboard();
    })().catch(err => console.error(err));
  </script>

</body>
</html>
