<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sessões de Aula</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
</head>

<body>
  <div id="layoutHost"></div>

  <template id="pageTemplate">

    <div class="d-flex gap-2 mb-3">
      <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalSessao" data-roles="ADMIN,SUPER_ADMIN,PROFESSOR">
        <i class="fa-solid fa-plus me-2"></i> Nova sessão
      </button>

      <input id="pesquisaSessao" class="form-control" placeholder="Pesquisar por turma...">
    </div>

    <div class="table-responsive">
      <table class="table table-bordered table-striped align-middle">
        <thead>
          <tr>
            <th>ID</th>
            <th>Turma</th>
            <th>Data</th>
            <th>Hora</th>
            <th>Estado</th>
            <th style="width: 220px;">Ações</th>
          </tr>
        </thead>
        <tbody id="tblSessoes"></tbody>
      </table>
    </div>

    <!-- Modal Nova Sessão -->
    <div class="modal fade" id="modalSessao" tabindex="-1">
      <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
          <form id="formSessao">
            <div class="modal-header">
              <h5 class="modal-title">Nova Sessão</h5>
              <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
              <div class="row g-3">
                <div class="col-md-6">
                  <label class="form-label">Turma</label>
                  <input id="sessTurma" class="form-control" required>
                </div>
                <div class="col-md-3">
                  <label class="form-label">Data</label>
                  <input id="sessData" type="date" class="form-control" required>
                </div>
                <div class="col-md-3">
                  <label class="form-label">Hora</label>
                  <input id="sessHora" type="time" class="form-control" required>
                </div>
              </div>
            </div>
            <div class="modal-footer">
              <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
              <button class="btn btn-primary" type="submit">Guardar</button>
            </div>
          </form>
        </div>
      </div>
    </div>

  </template>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/layout.js"></script>
  <script src="../js/sessoes.js"></script>

  <script>
      requireAuth();
      setUserInfo();
      applyRoleUI();
    (async () => {
      await loadLayout({ pageTitle: "Sessões de Aula", activePage: "sessoes" });
      document.getElementById("pageContent")
        .appendChild(document.getElementById("pageTemplate").content.cloneNode(true));
      initSessoes();
    })();
  </script>
</body>
</html>
