<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sessões</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
</head>

<body>
  <div id="layoutHost"></div>

  <template id="pageTemplate">
    <div class="d-flex gap-2 mb-3 align-items-center">
      <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalSessao" data-roles="ADMIN,SUPER_ADMIN,PROFESSOR">
        <i class="fa-solid fa-plus me-2"></i> Nova sessão
      </button>
    </div>

    <div id="msgSessoes" class="alert d-none"></div>

    <ul class="nav nav-tabs mb-3">
      <li class="nav-item">
        <button class="nav-link active" id="tabPorDar" type="button">Aulas por dar</button>
      </li>
      <li class="nav-item">
        <button class="nav-link" id="tabDadas" type="button">Aulas dadas</button>
      </li>
    </ul>

    <div class="table-responsive">
      <table class="table table-bordered table-striped align-middle">
        <thead>
          <tr>
            <th style="width:80px;">ID</th>
            <th style="width:180px;">Início</th>
            <th style="width:180px;">Fim</th>
            <th>Turma</th>
            <th>Tipo de Aula</th>
            <th style="width:140px;">Estado</th>
            <th>Sumário</th>
            <th style="width:220px;">Ações</th>
          </tr>
        </thead>
        <tbody id="tblSessoes"></tbody>
      </table>
    </div>

    <!-- MODAL NOVA SESSÃO -->
    <div class="modal fade" id="modalSessao" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
          <form id="formSessao">
            <div class="modal-header">
              <h5 class="modal-title">Nova Sessão</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
              <div class="row g-3">
                <div class="col-md-6">
                  <label class="form-label">Início</label>
                  <input id="inicio" type="datetime-local" class="form-control" required>
                </div>

                <div class="col-md-6">
                  <label class="form-label">Fim</label>
                  <input id="fim" type="datetime-local" class="form-control" required>
                </div>

                <div class="col-md-6">
                  <label class="form-label">Turma</label>
                  <select id="turma" class="form-select" required>
                    <option value="">Selecionar turma</option>
                  </select>
                </div>

                <div class="col-md-6">
                  <label class="form-label">Tipo de Aula</label>
                  <input id="tipoAulaInfo" class="form-control" readonly placeholder="Preenchido automaticamente pela turma">
                </div>

                <div class="col-md-6">
                  <label class="form-label">Estúdio</label>
                  <select id="estudio" class="form-select">
                    <option value="">Selecionar estúdio</option>
                  </select>
                </div>

                <div class="col-md-6">
                  <label class="form-label">Máx. alunos</label>
                  <input id="maxAlunos" type="number" class="form-control">
                </div>

                <div class="col-12">
                  <label class="form-label">Sumário</label>
                  <textarea id="sumario" class="form-control" rows="4"></textarea>
                </div>
              </div>

              <div id="msgCriarSessao" class="alert d-none mt-3"></div>
            </div>

            <div class="modal-footer">
              <button class="btn btn-secondary" type="button" data-bs-dismiss="modal">Cancelar</button>
              <button class="btn btn-primary" type="submit">Guardar</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </template>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/layout.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/sessoes.js"></script>

  <script>
    requireAuth();
    setUserInfo();
    applyRoleUI();

    (async () => {
      await loadLayout({ pageTitle: "Sessões", activePage: "sessoes" });

      const pageContent = document.getElementById("pageContent");
      const tpl = document.getElementById("pageTemplate");

      if (!pageContent || !tpl) {
        console.error("Layout ou template não encontrados.");
        return;
      }

      pageContent.appendChild(tpl.content.cloneNode(true));

      if (typeof initSessoes === "function") initSessoes();
    })().catch(console.error);
  </script>
</body>
</html>
