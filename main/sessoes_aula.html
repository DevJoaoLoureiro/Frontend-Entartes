<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sessões de Aula</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
</head>

<body>
  <div id="layoutHost"></div>

  <template id="pageTemplate">

    <div class="d-flex gap-2 mb-3 align-items-center">
      <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalSessao" data-roles="ADMIN,SUPER_ADMIN,PROFESSOR">
        <i class="fa-solid fa-plus me-2"></i> Nova sessão
      </button>

      <input id="pesquisaSessao" class="form-control" placeholder="Pesquisar por título/tipo...">
    </div>

    <div class="table-responsive">
      <table class="table table-bordered table-striped align-middle">
        <thead>
          <tr>
            <th style="width:70px;">ID</th>
            <th>Título</th>
            <th style="width:120px;">Tipo</th>
            <th style="width:180px;">Início</th>
            <th style="width:180px;">Fim</th>
            <th style="width:140px;">Estado</th>
            <th style="width: 320px;">Ações</th>
          </tr>
        </thead>
        <tbody id="tblSessoes"></tbody>
      </table>
    </div>

    <!-- Modal Nova Sessão -->
    <div class="modal fade" id="modalSessao" tabindex="-1">
      <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
          <form id="formSessao">
            <div class="modal-header">
              <h5 class="modal-title">Nova Sessão</h5>
              <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
              <div class="row g-3">
                <div class="col-md-6">
                  <label class="form-label">Título</label>
                  <input id="sessTitulo" class="form-control" required>
                </div>

                <div class="col-md-6">
                  <label class="form-label">Tipo</label>
                  <select id="sessTipo" class="form-select" required>
                    <option value="AULA">Aula</option>
                    <option value="COACHING">Coaching</option>
                  </select>
                </div>

                <div class="col-md-6">
                  <label class="form-label">Início</label>
                  <input id="sessInicio" type="datetime-local" class="form-control" required>
                </div>

                <div class="col-md-6">
                  <label class="form-label">Fim</label>
                  <input id="sessFim" type="datetime-local" class="form-control" required>
                </div>

                <div class="col-12">
                  <label class="form-label">Descrição (opcional)</label>
                  <textarea id="sessDescricao" class="form-control" rows="3" placeholder="Descrição da sessão..."></textarea>
                </div>
              </div>
            </div>
            <div class="modal-footer">
              <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
              <button class="btn btn-primary" type="submit">Guardar</button>
            </div>
          </form>
        </div>
      </div>
    </div>

  </template>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <script src="../js/auth.js"></script>
  <script src="../js/layout.js"></script>

  <!-- IMPORTANTE: inclui o ficheiro onde tens apiGet/apiPost e API_BASE_URL -->
  <!-- Se já estiver noutro script carregado globalmente, podes remover esta linha -->
  <script src="../js/api.js"></script>

  <script src="../js/sessoes.js"></script>

  <script>
    requireAuth();
    setUserInfo();
    applyRoleUI();

    (async () => {
      await loadLayout({ pageTitle: "Sessões de Aula", activePage: "sessoes" });
      document.getElementById("pageContent")
        .appendChild(document.getElementById("pageTemplate").content.cloneNode(true));
      initSessoes();
    })();
  </script>
</body>
</html>
