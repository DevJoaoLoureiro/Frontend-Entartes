<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Validar Presenças</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
</head>

<body>
  <div id="layoutHost"></div>

  <template id="pageTemplate">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h5 class="m-0">Validar Presenças</h5>
    </div>

    <div id="msgValidarPresencas" class="alert d-none"></div>

    <div class="table-responsive">
      <table class="table table-bordered table-striped align-middle">
        <thead>
          <tr>
            <th>Aluno</th>
            <th>Turma</th>
            <th>Professor</th>
            <th>Início</th>
            <th>Fim</th>
            <th style="width: 180px;">Vou / Foi</th>
          </tr>
        </thead>
        <tbody id="tblValidarPresencas">
          <tr>
            <td colspan="6" class="text-center small-muted">A carregar...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </template>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/layout.js"></script>
  <script src="../js/presencas-validar.js"></script>

  <script>
    (async () => {
      await loadLayout({ pageTitle: "Validar Presenças", activePage: "presencas" });

      const pageContent = document.getElementById("pageContent");
      const tpl = document.getElementById("pageTemplate");
      pageContent.appendChild(tpl.content.cloneNode(true));

      if (typeof initPresencasValidar === "function") {
        initPresencasValidar();
      }
    })().catch(console.error);
  </script>
</body>
</html>
