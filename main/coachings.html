<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coachings</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
</head>

<body>
  <div id="layoutHost"></div>

  <template id="pageTemplate">

    <div class="d-flex justify-content-between align-items-center mb-3">
      <h4 class="mb-0">
        <i class="fa-solid fa-bolt me-2"></i>Coachings (Sessões Abertas)
      </h4>
    </div>

    <div id="msgCoachings" class="alert d-none"></div>

    <div class="table-responsive">
      <table class="table table-bordered table-striped align-middle">
        <thead>
          <tr>
            <th style="width:80px;">ID</th>
            <th style="width:180px;">Início</th>
            <th style="width:180px;">Fim</th>
            <th style="width:140px;">Estado</th>
            <th>Sumário</th>
            <th style="width:260px;">Ações</th>
          </tr>
        </thead>
        <tbody id="tblCoachings"></tbody>
      </table>
    </div>

    <!-- MODAL INSCRIÇÃO DE EDUCANDOS -->
    <div class="modal fade" id="modalEducandos" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
          <form id="formInscreverEducandos">
            <div class="modal-header">
              <h5 class="modal-title">Inscrever educandos</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
              <div id="msgModalEducandos" class="alert d-none"></div>
              <div id="listaEducandosModal"></div>
            </div>

            <div class="modal-footer">
              <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
              <button type="submit" class="btn btn-primary">Guardar</button>
            </div>
          </form>
        </div>
      </div>
    </div>

  </template>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/layout.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/coachings.js"></script>

  <script>
    requireAuth();
    setUserInfo();
    applyRoleUI();

    (async () => {
      await loadLayout({ pageTitle: "Coachings", activePage: "coachings" });

      const pageContent = document.getElementById("pageContent");
      const tpl = document.getElementById("pageTemplate");
      pageContent.appendChild(tpl.content.cloneNode(true));

      if (typeof initCoachings === "function") initCoachings();
    })().catch(console.error);
  </script>
</body>
</html>
