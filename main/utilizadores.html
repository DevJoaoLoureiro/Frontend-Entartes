<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Utilizadores</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
</head>

<body>
  <div id="layoutHost"></div>

  <template id="pageTemplate">
    <div class="d-flex gap-2 mb-3 align-items-center">
      <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalCriarUser" data-roles="ADMIN,SUPER_ADMIN">
        <i class="fa-solid fa-user-plus me-2"></i>
      </button>

      <input id="pesquisaUser" class="form-control" placeholder="Pesquisar por nome / username / email...">

      <select id="filtroPerfil" class="form-select" style="max-width: 220px;">
        <option value="">Todos os perfis</option>
        <option value="ADMIN">ADMIN</option>
        <option value="SUPER_ADMIN">SUPER_ADMIN</option>
        <option value="PROFESSOR">PROFESSOR</option>
        <option value="ENCARREGADO">ENCARREGADO</option>
      </select>

      <select id="filtroAtivo" class="form-select" style="max-width: 190px;">
        <option value="">Ativos + Inativos</option>
        <option value="true">Só ativos</option>
        <option value="false">Só inativos</option>
      </select>
    </div>

    <div id="msgUtilizadores" class="alert d-none"></div>

    <div class="table-responsive">
      <table class="table table-bordered table-striped align-middle">
        <thead>
          <tr>
            <th style="width:90px;">ID</th>
            <th>Nome</th>
            <th>Username</th>
            <th>Email</th>
            <th style="width:160px;">Perfil</th>
            <th style="width:120px;">Ativo</th>
            <th style="width:260px;">Ações</th>
          </tr>
        </thead>
        <tbody id="tblUtilizadores"></tbody>
      </table>
    </div>

    <!-- MODAL: ENVIAR CONVITE -->
    <div class="modal fade" id="modalCriarUser" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <form id="formConviteUtilizador">
            <div class="modal-header">
              <h5 class="modal-title">Enviar convite</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
              <div class="mb-3">
                <label class="form-label">Email</label>
                <input id="conviteEmail" type="email" class="form-control" required>
              </div>

              <div class="mb-3">
                <label class="form-label">Perfil</label>
                <select id="convitePerfil" class="form-select" required>
                  <option value="ADMIN">ADMIN</option>
                  <option value="SUPER_ADMIN">SUPER_ADMIN</option>
                  <option value="PROFESSOR">PROFESSOR</option>
                  <option value="ENCARREGADO">ENCARREGADO</option>
                </select>
              </div>

              <div class="small-muted mt-3">
                Será enviado um email com um link para o utilizador criar a própria conta.
              </div>

              <div id="msgCriarUser" class="alert d-none mt-3"></div>
            </div>

            <div class="modal-footer">
              <button class="btn btn-secondary" type="button" data-bs-dismiss="modal">Cancelar</button>
              <button class="btn btn-primary" type="submit">
                <i class="fa-solid fa-paper-plane me-2"></i> Enviar convite
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </template>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/layout.js"></script>
  <script src="../js/utilizadores.js"></script>

  <script>
    (async () => {
      await loadLayout({ pageTitle: "Utilizadores", activePage: "utilizadores" });

      const pageContent = document.getElementById("pageContent");
      const tpl = document.getElementById("pageTemplate");
      pageContent.appendChild(tpl.content.cloneNode(true));

      if (typeof initUtilizadores === "function") initUtilizadores();
    })().catch(console.error);
  </script>
</body>
</html>
